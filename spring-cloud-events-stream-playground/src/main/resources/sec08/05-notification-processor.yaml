spring:
  cloud:
    function:
      definition: notificationProcessor
    stream:
      bindings:
        notificationProcessor-in-0:
          destination: order-events # topic name
          group: order-to-notification-processor-cg # consumer group
        notificationProcessor-out-0:
          destination: notification-events
      kafka:
        binder:
          brokers:
            - localhost:9092
          consumer-properties:
            auto.offset.reset: earliest # --from-beginning