spring:
  cloud:
    function:
      definition: highThroughputConsumer
    stream:
      bindings:
        highThroughputConsumer-in-0:
          destination: demo-topic
          group: demo-group # consumer group
          consumer:
            batch-mode: true
      kafka:
        binder:
          brokers:
            - localhost:8081
          consumer-properties:
            auto.offset.reset: earliest # --from-beginning
            fetch.min.bytes: 1024
            fetch.max.wait.ms: 500
            max.poll.records: 1000