spring:
  cloud:
    function:
      definition: consumer
    stream:
      bindings:
        consumer-in-0:
          destination: demo-topic
          group: demo-group
          consumer:
            max-attempts: 3                   # retry delivery attempts
            back-off-initial-interval: 2000   # wait time before first retry (ms)
            back-off-multiplier: 1.0          # fixed retry delay
            default-retryable: false          # should we retry all the exceptions? Default: true
            retryable-exceptions:
              com.explore.springcloudeventsstreamplayground.sec18.exceptions.InputValidationException: false    # do not retry
              com.explore.springcloudeventsstreamplayground.sec18.exceptions.ServiceUnavailableException: true  # retry
      kafka:
        binder:
          brokers:
            - localhost:9092
          consumer-properties:
            auto.offset.reset: earliest