spring:
  cloud:
    function:
      definition: consumer
    stream:
      bindings:
        consumer-in-0:
          destination: demo-topic
          group: demo-group
          consumer:
            max-attempts: 3                   # retry delivery attempts
            back-off-initial-interval: 2000   # wait time before first retry (ms)
            back-off-multiplier: 2.0          # retry delay grows exponentially
            back-off-max-interval: 10000      # upper bound for retry delay (ms)
      kafka:
        binder:
          brokers:
            - localhost:9092
          consumer-properties:
            auto.offset.reset: earliest