spring:
  cloud:
    function:
      definition: paymentProcessor
    stream:
      bindings:
        paymentProcessor-in-0:
          destination: order-events # topic name
          group: order-to-payment-processor-cg # consumer group
        paymentProcessor-out-0:
          destination: payment-events # topic name
      kafka:
        binder:
          brokers:
            - localhost:9092
          consumer-properties:
            auto.offset.reset: earliest # --from-beginning